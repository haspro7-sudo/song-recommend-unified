<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Song Recommend POC</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
/* ============================================
   DESIGN TOKENS
   ============================================ */
#loginGroup::placeholder{letter-spacing:0}
.login-input{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1.5px solid rgba(216,12,24,.15);background:var(--card);
  font-family:inherit;font-size:16px;color:var(--text);
  box-sizing:border-box;outline:none;text-align:center;
  transition:border-color .2s;
}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{color:var(--text-d)}
.login-label{font-size:12px;font-weight:700;color:var(--text-s);display:block;margin-bottom:6px;text-align:center}
.login-btn{
  width:100%;padding:14px 16px;border-radius:12px;
  background:var(--accent);color:#fff;font-family:inherit;
  font-size:15px;font-weight:700;border:none;cursor:pointer;
  transition:opacity .2s,transform .12s;
}
.login-btn:active{opacity:.8;transform:scale(.98)}
.login-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.login-chip{
  padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;
  background:var(--card);color:var(--text-s);border:1.5px solid rgba(216,12,24,.15);
  font-family:inherit;cursor:pointer;transition:all .2s;
}
.login-chip:active{transform:scale(.95)}
.login-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;overflow-y:auto}
.login-inner{width:100%;max-width:320px;text-align:center}
.login-emoji{font-size:48px;margin-bottom:10px}
.login-sub{font-size:13px;color:var(--text-s);margin-bottom:24px}
@media(max-height:600px){
  .login-wrap{align-items:flex-start;padding-top:32px}
  .login-emoji{font-size:36px;margin-bottom:6px}
  .login-sub{margin-bottom:16px}
}
:root {
  --bg:       #F5F5F7;
  --card:     #FFFFFF;
  --card-hi:  #F0F0F3;
  --accent:   #D80C18;
  --accent-l: #E83040;
  --growth:   #34A853;
  --cta:      #0077CC;
  --cta-l:    #2196F3;
  --social:   #E84393;
  --gold:     #F59E0B;
  --text:     #1C1C1C;
  --text-s:   #5A5A5A;
  --text-d:   #9E9E9E;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --nav-h:    64px;
}

/* ============================================
   RESET & BASE
   ============================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;list-style:none;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{
  font-family:'BIZ UDPGothic','Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100dvh;width:100vw;overflow:hidden;
  position:relative;touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
  font-size:16px;line-height:1.5;letter-spacing:0.02em;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}



/* BOOKMARK TAG FILTERS */
.bk-tag-filters{padding:8px 16px 0;display:flex;flex-direction:column;gap:8px}
.bk-filter-row{display:flex;align-items:center;gap:6px}
.bk-filter-label{font-size:11px;font-weight:700;color:var(--text-d);min-width:50px;flex-shrink:0}
.bk-filter-chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.bk-filter-chips::-webkit-scrollbar{display:none}
.bk-filter-chip{padding:5px 12px;border-radius:14px;font-size:12px;font-weight:600;white-space:nowrap;background:var(--card);color:var(--text-s);border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:all .15s;flex-shrink:0}
.bk-filter-chip:active{transform:scale(.95)}
.bk-filter-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.bk-active-filters{padding:4px 16px;font-size:11px;color:var(--accent);min-height:18px}

/* WANT-TO-SING TOGGLE (red) */
.want-btn{padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .15s;background:var(--card-hi);border:1.5px solid var(--text-d);font-family:inherit;font-size:11px;font-weight:700;color:var(--text-d);cursor:pointer}
.want-btn:active{transform:scale(.95)}
.want-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.want-btn .material-symbols-rounded{font-size:16px}
.want-btn.on .material-symbols-rounded{font-variation-settings:'FILL' 1}
/* KNOW = GREEN, WANT = RED in group */
.grp-song-knower{background:rgba(52,168,83,.1);color:#1B8A2E;border-left-color:var(--growth)!important}
.grp-song-knower.is-me{background:rgba(52,168,83,.18);color:#1B8A2E}
.grp-song-knower.wants{background:rgba(216,12,24,.1);color:var(--accent);border-left-color:var(--accent)!important}
.grp-song-knower.wants.is-me{background:rgba(216,12,24,.18);color:var(--accent)}

/* APP BRAND */
.app-brand{font-size:11px;color:var(--accent-l);font-weight:700;letter-spacing:0.05em;margin-bottom:-2px}

/* MINNA-GA-SHITTERU BADGE (prominent) */
.minna-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,#F59E0B,#EF6C00);
  color:#fff;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  box-shadow:0 2px 8px rgba(245,158,11,.25);
  animation:minna-glow 2s ease-in-out infinite alternate;
}
.minna-badge::before{content:'👥'}
@keyframes minna-glow{
  from{box-shadow:0 2px 8px rgba(255,215,0,.3)}
  to{box-shadow:0 2px 16px rgba(255,215,0,.5)}
}
.bigcard .minna-badge{font-size:13px;padding:5px 12px}
/* MYPAGE */
.mypage{padding:16px 16px 100px;overflow-y:auto;height:100%}
.mypage-profile{background:var(--card);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px}
.mypage-avatar{width:72px;height:72px;border-radius:50%;background:var(--accent);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px}
.mypage-name{font-size:18px;font-weight:700;margin-bottom:4px}
.mypage-sub{font-size:12px;color:var(--text-s)}
.mypage-section{margin-bottom:16px}
.mypage-section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mypage-section-title .material-symbols-rounded{font-size:18px;color:var(--accent)}
.mypage-tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.mypage-tag{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600}
.mypage-tag.top{background:var(--accent);color:#fff}
.mypage-tag.sub{background:var(--card);color:var(--text-s)}
.mypage-bar-wrap{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px}
.mypage-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.mypage-bar-label .val{font-weight:700;color:var(--accent)}
.mypage-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.mypage-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.mypage-menu{background:var(--card);border-radius:12px;overflow:hidden}
.mypage-menu-item{padding:14px 16px;font-size:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bg);cursor:pointer}
.mypage-menu-item:last-child{border-bottom:none}
.mypage-menu-item .material-symbols-rounded{font-size:20px;color:var(--accent)}
.mypage-menu-item .arrow{margin-left:auto;color:var(--text-d);font-size:16px}
.mypage-dev{margin-top:16px;padding:16px;background:var(--card);border-radius:12px;border:1px dashed var(--text-d)}
.mypage-dev-title{font-size:12px;color:var(--text-d);margin-bottom:8px}

/* GROUP */
.grp-page{padding:16px 16px 100px;overflow-y:auto;height:100%}
.grp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.grp-header h2{font-size:18px}
.grp-qr-area{background:var(--card);border-radius:16px;padding:16px;text-align:center;margin-bottom:16px}
.grp-qr-text{font-size:13px;color:var(--text-s)}
.grp-qr-code{font-size:20px;font-weight:700;color:var(--accent);margin-top:4px;letter-spacing:4px}
.grp-members{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.grp-member{background:var(--card);border-radius:12px;padding:10px 14px;text-align:center;min-width:70px;flex-shrink:0}
.grp-member-avatar{font-size:28px;margin-bottom:4px}
.grp-member-name{font-size:11px;font-weight:600;white-space:nowrap}
.grp-member.me{border:2px solid var(--accent)}
.grp-section-title{font-size:14px;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.grp-section-title .material-symbols-rounded{font-size:18px;color:var(--accent)}
/* みんなでタブ: 曲カード */
.grp-song-list{display:flex;flex-direction:column;gap:8px}
.grp-song{background:var(--card);border-radius:14px;padding:12px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:transform .12s}
.grp-song:active{transform:scale(.98)}
.grp-song-art{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.grp-song-body{flex:1;min-width:0}
.grp-song-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-song-artist{font-size:12px;color:var(--text-s);margin-top:1px}
.grp-song-knowers{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.grp-song-knower{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(52,168,83,.1);color:#1B8A2E}
.grp-song-knower.is-me{background:rgba(52,168,83,.18);color:#1B8A2E}
.grp-song-knower.wants{background:rgba(216,12,24,.1);color:var(--accent)}
.grp-song-count{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.grp-song-count.hot{background:#1B8A2E}
.grp-song-count.warm{background:#34A853}
.grp-song-count.cold{background:#8BC99B}
/* ムードフィルター */
.grp-mood-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.grp-mood-filter::-webkit-scrollbar{display:none}
.grp-mood-btn{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;background:var(--card);color:var(--text-s);transition:all .15s;flex-shrink:0}
.grp-mood-btn.on{background:var(--accent);color:#fff}
.grp-section-header{font-size:15px;font-weight:700;padding:14px 4px 8px;display:flex;align-items:center;gap:8px}
.grp-section-header.hot{color:#1B8A2E}
.grp-section-header.warm{color:#34A853}
.grp-section-header.cold{color:#8BC99B}
.grp-section-count{font-size:12px;font-weight:400;color:var(--text-d)}
.grp-empty-msg{text-align:center;padding:20px;color:var(--text-d);font-size:13px;line-height:1.6}
/* レガシー維持 */
.grp-next{background:rgba(108,92,231,.1);border:2px solid var(--accent);border-radius:16px;padding:16px;margin-bottom:8px}
.grp-next-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.grp-next-song{display:flex;gap:12px;align-items:center}
.grp-next-art{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.grp-next-body{flex:1;min-width:0}
.grp-next-title{font-size:16px;font-weight:700}
.grp-next-artist{font-size:13px;color:var(--text-s)}
.grp-next-reason{font-size:12px;margin-top:6px;padding:8px 10px;background:rgba(216,12,24,.06);border-radius:8px;color:var(--text);line-height:1.5}
.grp-next-reason strong{color:var(--accent)}
.grp-next-match{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;color:#fff;margin-top:6px}
.grp-next-actions{display:flex;gap:8px;margin-top:10px}
.grp-next-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;text-align:center}
.grp-next-btn.primary{background:var(--accent);color:#fff}
.grp-next-btn.secondary{background:var(--card);color:var(--text-s)}

/* ACTION LOG VIEWER (dev panel) */
.log-viewer{padding:16px 16px 100px;overflow-y:auto;height:100%}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.log-header h2{font-size:18px}
.log-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.log-stat{background:var(--card);border-radius:12px;padding:12px;text-align:center}
.log-stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.log-stat .lbl{font-size:11px;color:var(--text-s);margin-top:2px}
.log-btns{display:flex;gap:8px;margin-bottom:16px}
.log-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;text-align:center}
.log-btn-export{background:var(--accent);color:#fff}
.log-btn-clear{background:var(--card);color:var(--text-s)}
.log-btn-sheet{background:#34A853;color:#fff}
.log-list{display:flex;flex-direction:column;gap:6px}
.log-entry{background:var(--card);border-radius:10px;padding:10px 12px;font-size:12px;display:flex;gap:10px;align-items:flex-start}
.log-entry .log-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.log-entry .log-body{flex:1;min-width:0}
.log-entry .log-action{font-weight:700;color:var(--text);font-size:13px}
.log-entry .log-detail{color:var(--text-s);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-entry .log-time{color:var(--text-d);font-size:10px;flex-shrink:0}
.log-empty{text-align:center;padding:40px 0;color:var(--text-d)}
.log-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.log-filter-btn{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:700;background:var(--card);color:var(--text-s);white-space:nowrap}
.log-filter-btn.on{background:var(--accent);color:#fff}
.log-count{font-size:12px;color:var(--text-d);margin-bottom:8px}

/* Material Symbols */
.material-symbols-rounded{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  font-size:24px;vertical-align:middle;
}
.material-symbols-rounded.filled{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
}

/* ============================================
   SCREEN SYSTEM
   ============================================ */
.scr{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  transform:translateX(24px);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scr::-webkit-scrollbar{display:none}
.scr.on{opacity:1;pointer-events:auto;transform:none}
.scr.slide-in{transform:translateX(100%);opacity:0}
.scr.slide-in.on{transform:translateX(0);opacity:1}

/* ============================================
   BOTTOM NAV
   ============================================ */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  display:none;border-top:1px solid rgba(216,12,24,.15);
  padding-bottom:var(--safe-b);
}
.nav.show{display:flex}
.nav button{
  flex:1;padding:6px 0 4px;font-size:11px;font-weight:700;
  color:var(--text-d);display:flex;flex-direction:column;
  align-items:center;gap:2px;transition:color .15s;position:relative;
  min-height:48px;min-width:48px;
}
.nav button.on{color:var(--accent)}
.nav button .material-symbols-rounded{font-size:28px}
.nav button.on .material-symbols-rounded{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.nav .badge-dot{
  position:absolute;top:2px;right:calc(50% - 16px);
  width:8px;height:8px;border-radius:50%;background:var(--cta);
  display:none;
}
.nav .badge-dot.show{display:block}
.grp-nav-badge{
  position:absolute;top:2px;right:calc(50% - 20px);
  min-width:18px;height:18px;border-radius:9px;
  background:var(--growth);color:#fff;
  font-size:10px;font-weight:700;
  display:none;align-items:center;justify-content:center;padding:0 4px;
}
.grp-nav-badge.show{display:flex}

/* ============================================
   TOAST
   ============================================ */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700;
  background:var(--accent);color:#fff;z-index:999;
  box-shadow:0 4px 16px rgba(216,12,24,.25);
  animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* ============================================
   SPLASH
   ============================================ */
#splash{
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  overflow:hidden;z-index:200;
}
.splash-wrap{text-align:center;animation:splashIn .7s ease-out;position:relative;z-index:2}
.splash-logo{font-size:42px;font-weight:700;letter-spacing:-1px}
.splash-tag{font-size:14px;color:var(--text-s);margin-top:6px}
@media(max-height:600px){
  .splash-logo{font-size:32px}
  .splash-tag{font-size:12px}
}
.splash-bg{position:absolute;inset:0;overflow:hidden}
.splash-bg .sp{position:absolute;border-radius:50%;opacity:.08;background:var(--accent);animation:spFloat 6s ease-in-out infinite}
@keyframes spFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.1)}}
@keyframes splashIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* ============================================
   HOME — VERTICAL 3-CARD LAYOUT
   ============================================ */
.stack{
  position:relative;flex:1;display:flex;flex-direction:column;gap:8px;
  padding:8px 16px calc(var(--nav-h) + var(--safe-b) + 16px);
  overflow-y:auto;overflow-x:hidden;
}
.home-header{
  padding:14px 20px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.home-header h1{font-size:22px;font-weight:700}
.home-counter{font-size:14px;color:var(--text-s)}

/* Vertical card */
.vcard{
  display:flex;border-radius:16px;background:var(--card);overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3);touch-action:pan-y;user-select:none;
  will-change:transform;animation:vcardIn .3s ease both;min-height:100px;position:relative;flex-shrink:0;
}
.vcard-hints{
  position:absolute;top:50%;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;
  pointer-events:none;padding:0 6px;
  transform:translateY(-50%);
}
.vcard-hint{
  padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;
  transition:opacity .15s,transform .15s;
}
.vcard-hint.skip{color:#fff;background:var(--cta);opacity:.5}
.vcard-hint.like{color:#fff;background:var(--growth);opacity:.5}
.vcard-hint.active{opacity:1;transform:scale(1.08)}
.vcard-hint.dim{opacity:.15}
.vcard-art{width:110px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.vcard-art span{font-size:42px;opacity:.3}
.vcard-body{flex:1;padding:10px 8px 10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;cursor:pointer}
.vcard-top{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.vcard-match{display:inline-block;padding:2px 8px;border-radius:8px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.vcard-reason{font-size:12px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-title{font-size:20px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-artist{font-size:14px;color:var(--text-s);margin-top:1px}
.song-desc{font-size:12px;color:var(--text-d);margin-top:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;max-height:28px;overflow:hidden}
.vcard-safety{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.vcard-actions{display:flex;flex-direction:column;gap:6px;padding:8px 10px;align-items:center;justify-content:center;flex-shrink:0}
.vcard-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;transition:transform .15s,background .15s;cursor:pointer}
.vcard-btn.add{background:rgba(255,107,53,.15);color:var(--cta)}
.vcard-btn.add:active{background:rgba(255,107,53,.4);transform:scale(.85)}
.vcard-btn.skip{background:rgba(0,0,0,.04);color:var(--text-s)}
.vcard-btn.skip:active{background:rgba(0,0,0,.08);transform:scale(.85)}
@keyframes vcardIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.vcard-empty{text-align:center;padding:40px 0;color:var(--text-s)}

/* Safety badges */
.safety-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;
}
.safety-badge.easy{background:rgba(0,210,160,.15);color:var(--growth)}
.safety-badge.popular{background:rgba(9,132,227,.15);color:#74B9FF}
.safety-badge.party{background:rgba(255,107,53,.15);color:var(--cta)}

/* Hash tags */
.htag{
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap;
}
.htag.genre{background:rgba(255,105,180,.15);color:var(--social)}
.htag.air{background:rgba(255,215,0,.12);color:var(--gold)}
.htag.diff{background:rgba(0,210,160,.12);color:var(--growth)}
.htag.key{background:rgba(216,12,24,.15);color:var(--accent)}
.htag.reason{background:rgba(255,215,0,.18);color:var(--gold);border:1px solid rgba(255,215,0,.25)}
.htag.reason-strong{background:rgba(255,215,0,.25);color:var(--text);border:1px solid rgba(255,215,0,.4);animation:reasonPulse 1.5s ease infinite}
.htag.reason-social{background:rgba(0,210,160,.2);color:var(--growth);border:1px solid rgba(0,210,160,.3);font-weight:700}
.htag.reason-cooc{background:rgba(108,92,231,.2);color:var(--accent);border:1px solid rgba(108,92,231,.3)}
.htag.reason-discover{background:rgba(0,184,148,.2);color:#00b894;border:1px solid rgba(0,184,148,.3)}
.htag.reason-classic{background:rgba(255,107,53,.18);color:var(--cta);border:1px solid rgba(255,107,53,.25)}
.htag.reason-match{background:rgba(0,210,160,.15);color:var(--growth);border:1px solid rgba(0,210,160,.2)}
@keyframes reasonPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 6px 1px rgba(255,215,0,.3)}}

/* Match reason tags row */
.match-reasons{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.match-reasons .htag{font-size:11px;padding:2px 7px}

/* ============================================
   PARTICLES / EFFECTS
   ============================================ */
.heart-p{position:fixed;pointer-events:none;z-index:200;font-size:22px;animation:hFloat .9s ease-out forwards}
@keyframes hFloat{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}}
.confetti-p{position:fixed;pointer-events:none;z-index:200;border-radius:2px;animation:cFall 1.4s ease-out forwards}
@keyframes cFall{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--tx),380px) rotate(600deg)}}
.tag-burst{position:fixed;pointer-events:none;z-index:250;border-radius:10px;font-size:12px;font-weight:700;padding:3px 10px;white-space:nowrap;animation-fill-mode:forwards}
.tag-burst.dir-r{animation:tbRight var(--dur,.7s) cubic-bezier(.22,.61,.36,1) forwards}
.tag-burst.dir-l{animation:tbLeft var(--dur,.5s) ease-in forwards}
@keyframes tbRight{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}
  40%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(var(--sc,1.3)) rotate(var(--rot,15deg))}
  100%{opacity:0;transform:translate(calc(var(--tx) * 2.2),calc(var(--ty) * 1.5)) scale(.3) rotate(calc(var(--rot) * 3))}
}
@keyframes tbLeft{
  0%{opacity:.8;transform:translate(0,0) scale(1) rotate(0)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.15) rotate(var(--rot,-30deg))}
}
.mood-popup{position:fixed;pointer-events:none;z-index:260;font-weight:700;text-align:center;animation:moodPop .7s cubic-bezier(.17,.67,.35,1.5) forwards}
@keyframes moodPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(-10deg)}
  35%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}
  60%{transform:translate(-50%,-50%) scale(.95) rotate(-1deg)}
  80%{transform:translate(-50%,-50%) scale(1.02) rotate(0)}
  100%{opacity:0;transform:translate(-50%,-60%) scale(1.3) rotate(0)}
}

/* ============================================
   SONG DETAIL SCREEN
   ============================================ */
#song-detail{z-index:50}
.sd-header{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
}
.sd-back{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.08);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
}
.sd-back:active{transform:scale(.9)}
.sd-header-info{flex:1;min-width:0}
.sd-header-info h2{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-header-info p{font-size:14px;color:var(--text-s)}

.sd-hero{
  display:flex;align-items:center;justify-content:center;
  height:160px;position:relative;
}
.sd-hero-emoji{font-size:80px;opacity:.4}

.sd-safety{display:flex;gap:6px;flex-wrap:wrap;padding:0 20px;margin-bottom:12px}
.sd-safety .safety-badge{font-size:14px;padding:4px 12px}

.sd-info{padding:0 20px 16px}
.sd-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sd-info-item{background:var(--card);border-radius:12px;padding:10px 14px}
.sd-info-item .label{font-size:12px;color:var(--text-s);margin-bottom:2px}
.sd-info-item .value{font-size:14px;font-weight:700}

.sd-section-title{
  font-size:16px;font-weight:700;padding:16px 20px 8px;
  display:flex;align-items:center;gap:8px;
}

/* Related songs horizontal scroll */
.sd-route{padding:0 0 16px}
.sd-route-name{
  font-size:14px;font-weight:700;color:var(--text-s);
  padding:0 20px 8px;display:flex;align-items:center;gap:6px;
}
.sd-route-scroll{
  display:flex;gap:10px;overflow-x:auto;padding:0 20px;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.sd-route-scroll::-webkit-scrollbar{display:none}

/* Mini card */
.mini-card{
  flex-shrink:0;width:130px;min-height:170px;
  background:var(--card);border-radius:14px;overflow:hidden;
  scroll-snap-align:start;cursor:pointer;position:relative;
  transition:transform .15s;
}
.mini-card:active{transform:scale(.96)}
.mini-card-art{
  height:70px;display:flex;align-items:center;justify-content:center;
  font-size:32px;opacity:.4;position:relative;
}
.mini-card-add{
  position:absolute;top:6px;right:6px;width:28px;height:28px;
  border-radius:50%;background:rgba(255,107,53,.8);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;z-index:2;cursor:pointer;
}
.mini-card-add:active{transform:scale(.85)}
.mini-card-add.added{background:rgba(0,210,160,.8)}
.mini-card-body{padding:8px 10px}
.mini-card-title{font-size:14px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-card-artist{font-size:12px;color:var(--text-s);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-card-sing{font-size:12px;font-weight:700;margin-top:4px}
.mini-card-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.mini-card-badges .safety-badge{font-size:10px;padding:1px 5px}

/* Action bar */
.sd-actions{
  position:sticky;bottom:0;z-index:10;
  display:flex;gap:8px;padding:12px 20px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
  border-top:1px solid rgba(216,12,24,.08);
}
.sd-actions .btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px;border-radius:14px;font-size:14px;font-weight:700;
  min-height:48px;transition:transform .12s;
}
.sd-actions .btn:active{transform:scale(.97)}
.btn-bookmark{background:var(--growth);color:#fff}
.btn-bookmark.added{background:var(--growth);opacity:.7}
.btn-reserve{background:var(--cta);color:#fff;cursor:pointer}
.btn-reserve.reserved{background:var(--growth)}

/* ============================================
   BOOKMARK SCREEN
   ============================================ */
.bk-header{padding:14px 20px 8px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.bk-header h1{font-size:22px;font-weight:700}

/* Scene tabs */
.scene-tabs{
  display:flex;gap:6px;overflow-x:auto;padding:0 20px 10px;
  -webkit-overflow-scrolling:touch;flex-shrink:0;
}
.scene-tabs::-webkit-scrollbar{display:none}
.scene-tab{
  flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:700;
  background:var(--card);color:var(--text-s);white-space:nowrap;
  transition:all .15s;border:1.5px solid transparent;min-height:48px;
  display:flex;align-items:center;cursor:pointer;
}
.scene-tab.on{border-color:var(--accent);color:var(--accent);background:rgba(216,12,24,.08)}
.scene-tab:active{transform:scale(.95)}

.bk-reason{
  padding:8px 20px;font-size:14px;color:var(--gold);
  animation:fadeSlide .3s ease;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.bk-empty{text-align:center;padding:60px 20px;color:var(--text-s)}
.bk-empty .material-symbols-rounded{font-size:64px;opacity:.3;display:block;margin-bottom:12px}

/* Bookmark list */
.bk-list{padding:0 20px;flex:1}
.bk-item{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border-radius:14px;padding:12px;
  margin-bottom:8px;cursor:pointer;transition:transform .15s;
  animation:fadeSlide .3s ease;
}
.bk-item:active{transform:scale(.98)}
.bk-num{font-size:16px;font-weight:700;color:var(--accent);width:24px;text-align:center;flex-shrink:0}
.bk-info{flex:1;min-width:0}
.bk-info .title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-info .artist{font-size:14px;color:var(--text-s);margin-top:1px}
.bk-info .badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.bk-sing{font-size:14px;font-weight:700;flex-shrink:0;margin-right:4px}
.bk-del{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;
  color:var(--text-d);flex-shrink:0;cursor:pointer;min-width:36px;
}
.bk-del:active{background:rgba(255,68,68,.2);color:#FF4444}

/* Summary bar */
.bk-summary{
  position:sticky;bottom:0;
  padding:12px 20px calc(64px + var(--safe-b));background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
  border-top:1px solid rgba(216,12,24,.08);text-align:center;
}
.bk-summary-text{font-size:14px;color:var(--text-s);margin-bottom:8px}
.bk-summary .btn-reserve-all{
  width:100%;padding:14px;border-radius:14px;font-size:16px;font-weight:700;
  background:rgba(255,255,255,.08);color:var(--text-d);min-height:48px;
}
.btn-create-playlist{
  width:100%;padding:14px;border-radius:14px;font-size:16px;font-weight:700;
  background:var(--accent);color:#fff;
  min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:8px;transition:transform .12s;
}
.btn-create-playlist:active{transform:scale(.97)}

/* Playlist section in bookmark */
.pl-section{padding:0 20px 12px}
.pl-section-title{font-size:14px;font-weight:700;color:var(--text-s);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pl-card{
  display:flex;align-items:center;gap:12px;
  background:var(--card);
  border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;
  transition:transform .15s;border:1px solid rgba(216,12,24,.08);
}
.pl-card:active{transform:scale(.98)}
.pl-card-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.pl-card-info{flex:1;min-width:0}
.pl-card-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-card-meta{font-size:13px;color:var(--text-s);margin-top:2px}
.pl-card-arrow{color:var(--text-d);flex-shrink:0}

/* Playlist detail screen */
.pl-detail-header{
  padding:14px 20px 0;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.pl-detail-back{
  width:40px;height:40px;border-radius:50%;background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.pl-detail-back:active{transform:scale(.9)}
.pl-detail-title{flex:1;font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-detail-actions{display:flex;gap:8px}
.pl-detail-actions button{
  width:40px;height:40px;border-radius:50%;background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.pl-detail-actions button:active{transform:scale(.9)}
.pl-detail-meta{padding:8px 20px 12px;font-size:14px;color:var(--text-s)}
.pl-detail-list{padding:0 20px;flex:1}
.pl-detail-footer{padding:12px 20px 120px;display:flex;flex-direction:column;gap:8px}
.btn-reserve-all-pl{width:100%;padding:14px;border-radius:12px;background:var(--cta);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-reserve-all-pl:active{transform:scale(.97);opacity:.85}
.btn-reserve-all-pl:disabled{opacity:.4}
.btn-reserve-all-pl .material-symbols-rounded{font-size:22px}
.reserve-note{font-size:12px;color:var(--text-d);text-align:center}
.bk-reserve{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,107,53,.12);color:var(--cta);flex-shrink:0;transition:all .15s}
.bk-reserve:active{transform:scale(.9)}
.bk-reserve.reserved{background:var(--cta);color:#fff}
.reserve-toast-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.reserve-toast-overlay.show{opacity:1;pointer-events:auto}
.reserve-toast-box{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;max-width:300px;width:90%}
.reserve-toast-box .reserve-icon{font-size:48px;margin-bottom:12px}
.reserve-toast-box h3{font-size:18px;font-weight:700;margin-bottom:8px}
.reserve-toast-box p{font-size:14px;color:var(--text-s);line-height:1.5}
.reserve-toast-box .reserve-ok{margin-top:16px;padding:10px 32px;border-radius:20px;background:var(--cta);color:#fff;font-size:15px;font-weight:700}

/* Bottom sheet */
.sheet-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.sheet-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-width:420px;background:var(--card);
  border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-b));
  transform:translateY(0);animation:sheetUp .25s ease;
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--text-d);margin:0 auto 16px}
.sheet h2{font-size:18px;font-weight:700;margin-bottom:16px}
.sheet-input{
  width:100%;padding:14px;border-radius:12px;border:1.5px solid rgba(108,92,231,.3);
  background:var(--bg);color:var(--text);font-family:inherit;font-size:16px;
  outline:none;transition:border-color .15s;
}
.sheet-input:focus{border-color:var(--accent)}
.sheet-preview{
  margin-top:12px;max-height:200px;overflow-y:auto;
  border-radius:12px;background:rgba(0,0,0,.2);padding:12px;
}
.sheet-preview-item{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  font-size:14px;color:var(--text-s);
}
.sheet-preview-num{color:var(--accent);font-weight:700;width:20px;text-align:center;flex-shrink:0}
.sheet-preview-title{font-weight:700;color:var(--text)}
.sheet-btns{display:flex;gap:8px;margin-top:16px}
.sheet-btns button{
  flex:1;padding:14px;border-radius:14px;font-size:16px;font-weight:700;
  min-height:48px;transition:transform .12s;
}
.sheet-btns button:active{transform:scale(.97)}
.sheet-btn-cancel{background:rgba(255,255,255,.08);color:var(--text-s)}
.sheet-btn-save{background:var(--accent);color:#fff}

/* Setlist manage sheet */
.sl-manage-list{margin-top:12px;max-height:300px;overflow-y:auto}
.sl-manage-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:12px;cursor:pointer;transition:background .12s;
}
.sl-manage-item:active{background:rgba(216,12,24,.08)}
.sl-manage-check{
  width:24px;height:24px;border-radius:6px;border:2px solid var(--text-d);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.sl-manage-check.checked{background:var(--accent);border-color:var(--accent)}
.sl-manage-check .material-symbols-rounded{font-size:18px;color:#fff;opacity:0;transition:opacity .12s}
.sl-manage-check.checked .material-symbols-rounded{opacity:1}
.sl-manage-name{flex:1;font-size:15px;font-weight:700}
.sl-manage-count{font-size:13px;color:var(--text-s)}
.sl-manage-new{
  display:flex;align-items:center;gap:8px;padding:12px;
  border-radius:12px;cursor:pointer;color:var(--accent);font-weight:700;font-size:15px;
  transition:background .12s;
}
.sl-manage-new:active{background:rgba(216,12,24,.08)}
.sl-manage-divider{height:1px;background:rgba(0,0,0,.06);margin:8px 0}

/* Setlist button on bookmark items */
.bk-setlist{
  width:36px;height:36px;border-radius:50%;
  background:rgba(216,12,24,.15);display:flex;align-items:center;justify-content:center;
  color:var(--accent);flex-shrink:0;cursor:pointer;min-width:36px;
  transition:all .12s;
}
.bk-setlist:active{background:rgba(108,92,231,.3);transform:scale(.9)}
.bk-reserve-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,107,53,.12);color:var(--cta);flex-shrink:0;transition:all .15s}
.bk-reserve-btn:active{transform:scale(.9)}
.bk-reserve-btn.reserved{background:var(--cta);color:#fff}
.bk-setlist.in-list{background:rgba(108,92,231,.3);color:var(--accent-l)}
.bk-select-bar{display:none;position:sticky;top:0;z-index:10;background:rgba(108,92,231,.95);backdrop-filter:blur(8px);padding:10px 16px;gap:8px;align-items:center;border-radius:0 0 12px 12px}
.bk-select-bar.show{display:flex}
.bk-select-bar .sel-count{flex:1;font-size:14px;font-weight:700;color:#fff}
.bk-select-bar .sel-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.bk-select-bar .sel-cancel{background:rgba(0,0,0,.1);color:#fff}
.bk-select-bar .sel-add-to{background:var(--accent);color:#fff}
.bk-select-bar .sel-add-to:disabled{opacity:.4}
.bk-select-bar .sel-create{background:var(--cta);color:#fff}
.bk-select-bar .sel-create:disabled{opacity:.4}
.bk-item.selectable{cursor:pointer}

/* ============================================

   ============================================ */
.coach-overlay{

/* ============================================

.search-wrap{

.kara-meter{

/* ============================================

.bigcard-area{
  position:relative;flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px 20px calc(var(--nav-h) + var(--safe-b) + 8px);

}
.bigcard{
  position:absolute;width:calc(100% - 40px);max-width:380px;
  max-height:calc(100% - 16px);aspect-ratio:3/4;border-radius:24px;background:var(--card);
  overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);
  touch-action:none;user-select:none;will-change:transform;
  cursor:grab;display:flex;flex-direction:column;
}
.bigcard:active{cursor:grabbing}
.bigcard.behind{
  transform:scale(0.96) translateY(10px);z-index:1;pointer-events:none;
  filter:brightness(.7);
}
.bigcard.front{z-index:2}
.bigcard-art{
  position:relative;flex:0 0 40%;display:flex;align-items:center;justify-content:space-between;
  overflow:hidden;padding:0 10px;
}
/* Card action zones */
.bigcard-actions{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;width:100%;height:100%;padding:0 24px}
.bigcard-action{display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.5;transition:opacity .2s,transform .2s}
.bigcard-action .action-circle{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid rgba(0,0,0,.15);background:rgba(255,255,255,.9);backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.bigcard-action .material-symbols-rounded{font-size:32px;font-variation-settings:'FILL' 1}
.bigcard-action .action-label{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;text-shadow:0 0 6px rgba(255,255,255,.9)}
.bigcard-action.skip-zone .action-circle{border-color:var(--text-d)}
.bigcard-action.skip-zone .material-symbols-rounded{color:var(--text-d)}
.bigcard-action.like-zone .action-circle{border-color:var(--growth)}
.bigcard-action.like-zone .material-symbols-rounded{color:var(--growth)}
.bigcard-action.active{opacity:1;transform:scale(1.15)}
.bigcard-action.active .action-circle{transform:scale(1.1)}
.bigcard-action.dim{opacity:.1}
/* Singability badge (compact, shown in body) */
.sing-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;align-self:flex-start}
.sing-badge .material-symbols-rounded{font-size:16px;font-variation-settings:'FILL' 1}
.bigcard-art::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:70%;
  background:linear-gradient(transparent,var(--card));z-index:3;
}
.bigcard-body{
  position:relative;z-index:4;flex:1;padding:12px 16px 16px;display:flex;flex-direction:column;gap:5px;
}
.bigcard-match{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:13px;font-weight:700;color:#fff;align-self:flex-start;
}
.bigcard-title{font-size:22px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bigcard-artist{font-size:14px;color:var(--text-s)}
.bigcard-safety{display:flex;gap:4px;flex-wrap:wrap}
.bigcard-tags{display:flex;gap:4px;flex-wrap:wrap}
/* Legacy hint classes (kept for JS compatibility) */
.bigcard-hint{display:none}
/* Legacy label kept for reserve overlay */
.bigcard-label{
  position:absolute;z-index:10;padding:10px 24px;border-radius:14px;
  font-size:22px;font-weight:700;letter-spacing:1px;opacity:0;pointer-events:none;
}
.bigcard-label.reserve{
  display:none;
  top:24px;left:50%;transform:translateX(-50%);
  color:#FF8C42;border:3px solid #FF8C42;background:rgba(255,140,66,.12);
}
.bigcard-empty{
  text-align:center;color:var(--text-s);padding:40px 20px;
}

/* tag burst upward for reserve */
.tag-burst.dir-u{animation:tbUp var(--dur,.7s) cubic-bezier(.22,.61,.36,1) forwards}
@keyframes tbUp{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}
  40%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(var(--sc,1.3)) rotate(var(--rot,10deg))}
  100%{opacity:0;transform:translate(calc(var(--tx)*1.5),calc(var(--ty)*2.5)) scale(.3) rotate(calc(var(--rot)*3))}
}

/* ============================================
   DYNAMIC SINGABILITY ENGINE
   性別×年代→声域推定→曲キーとの比較で歌えそう度を動的計算
   参照: JOYSOUND最適キー機能 / ロジック定義書#5,#14
   ============================================ */
const VOICE_RANGE={
  'male-10s':{low:-3,high:3,adj:0},
  'male-20s':{low:-3,high:3,adj:0},
  'male-30s':{low:-4,high:2,adj:-1},
  'male-40s':{low:-5,high:1,adj:-2},
  'male-50s':{low:-6,high:0,adj:-3},
  'female-10s':{low:0,high:6,adj:1},
  'female-20s':{low:0,high:6,adj:1},
  'female-30s':{low:-1,high:5,adj:0},
  'female-40s':{low:-2,high:5,adj:0},
  'female-50s':{low:-3,high:4,adj:-1},
  'other-20s':{low:-2,high:4,adj:0},
};
function getUserVoiceRange(){
  const g=_userGender||localStorage.getItem('sr_gender')||'other';
  const a=_userAge||localStorage.getItem('sr_age')||'20s';
  return VOICE_RANGE[g+'-'+a]||VOICE_RANGE['other-20s'];
}
function dynamicSingability(song){
  const vr=getUserVoiceRange();
  const keyNum=parseInt(song.k)||0;
  // 曲キーがユーザー声域に収まるか
  const diff=Math.abs(keyNum-vr.adj);
  // 基礎singabilityに声域マッチ補正を加える
  let base=song.singability||70;
  if(diff===0)base+=8;       // 完全マッチ
  else if(diff<=1)base+=4;   // ほぼマッチ
  else if(diff<=2)base+=0;   // 普通
  else if(diff<=3)base-=5;   // ちょっとキツい
  else base-=10;             // かなりキツい
  // 難易度による補正
  if(song.d===1)base+=3;     // 簡単な曲はさらにUP
  if(song.d===3)base-=3;     // 難しい曲はさらにDOWN
  return Math.max(40,Math.min(99,Math.round(base)));
}
// おすすめキー表示
function recommendedKey(song){
  const vr=getUserVoiceRange();
  const keyNum=parseInt(song.k)||0;
  const adj=vr.adj-keyNum;
  if(adj===0)return '原曲キー';
  return (adj>0?'+':'')+adj;
}

/* ============================================
   ATTRIBUTE SIMILARITY ENGINE
   属性類似度で関連曲を自動抽出（yapico無し代替）
   参照: Spotify 3本柱モデル / Gracenote Sonic Descriptor
   ============================================ */
function calcSimilarity(a,b){
  let score=0;
  // ジャンル一致(25%)
  if(a.tag===b.tag)score+=25;
  else if(a.tag&&b.tag){
    // サブジャンル的な近接チェック(タグ内文字列一部一致)
    const common=['POP','ロック','バラード','アニ','ドラマ'];
    if(common.some(c=>a.tag.includes(c)&&b.tag.includes(c)))score+=12;
  }
  // 空気感一致(20%)
  if(a.mood===b.mood)score+=20;
  // バイブ一致(15%)
  if(a.v===b.v)score+=15;
  else if(Math.abs(a.v-b.v)===1)score+=7;
  // アーティスト一致(15%)
  if(a.a===b.a)score+=15;
  // 年代近接(10%)
  if(a.era===b.era)score+=10;
  // キー近接(10%)
  const kA=parseInt(a.k)||0,kB=parseInt(b.k)||0;
  if(Math.abs(kA-kB)<=1)score+=10;
  else if(Math.abs(kA-kB)<=2)score+=5;
  // 難易度近接(5%)
  if(a.d===b.d)score+=5;
  return score;
}
function getRelatedBySimilarity(song,n=6){
  const scored=S.filter(s=>s.id!==song.id)
    .map(s=>({s,score:calcSimilarity(song,s)}))
    .sort((a,b)=>b.score-a.score);
  return scored.slice(0,n).map(x=>x.s.id);
}
function getSameVibeSongs(song,n=6){
  return S.filter(s=>s.id!==song.id&&s.mood===song.mood&&s.tag!==song.tag)
    .sort((a,b)=>{
      const da=Math.abs((parseInt(a.k)||0)-(parseInt(song.k)||0));
      const db=Math.abs((parseInt(b.k)||0)-(parseInt(song.k)||0));
      return da-db;
    })
    .slice(0,n).map(s=>s.id);
}
function getCoSingSongs(song,n=6){
  // セッション共起シミュレーション: 同アーティスト + 同シーン + 人気度で擬似共起
  return S.filter(s=>s.id!==song.id)
    .map(s=>{
      let sc=0;
      if(s.a===song.a)sc+=3;
      if(song.sc&&s.sc)song.sc.forEach(scene=>{if(s.sc.includes(scene))sc+=2;});
      if(s.popularity==='high')sc+=1;
      if(s.era===song.era)sc+=1;
      return {s,sc};
    })
    .sort((a,b)=>b.sc-a.sc)
    .slice(0,n).map(x=>x.s.id);
}

// あなたの声域で歌える（ロジック定義書#14）
function getVoiceMatchSongs(song,n=6){
  return S.filter(s=>s.id!==song.id)

    .filter(x=>x.match>=80)

    .slice(0,n).map(x=>x.s.id);
}

// 年代→優先era マッピング
const AGE_ERA_MAP={
  '10s':['2020s'],
  '20s':['2020s','2010s'],
  '30s':['2010s','2000s'],
  '40s':['2000s','1990s'],
  '50s':['1990s','1980s','1970s以前','1990s以前']

function initDeck(){
  deck=[];
  for(let i=0;i<S.length;i++){if(!seen.has(S[i].id))deck.push(i);}
  // Shuffle then resort with age boost
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  resortDeck();displayed=[];fillDisplayed();
}
function fillDisplayed(){while(displayed.length<3&&deck.length>0){displayed.push(deck.shift());}}
function updatePref(song,liked){
  const w=liked?1:-.3;
  pref.tag[song.tag]=(pref.tag[song.tag]||0)+w;
  pref.mood[song.mood]=(pref.mood[song.mood]||0)+w;
  pref.v[song.v]=(pref.v[song.v]||0)+w;
  pref.d[song.d]=(pref.d[song.d]||0)+w;
  pref.a[song.a]=(pref.a[song.a]||0)+w;
  if(song.sc)song.sc.forEach(s=>{pref.sc[s]=(pref.sc[s]||0)+w;});
  // キー帯の学習
  const kBand=keyBand(song.k);
  if(!pref.kb)pref.kb={};
  pref.kb[kBand]=(pref.kb[kBand]||0)+w;
  // 年代の学習
  if(song.era){
    if(!pref.era)pref.era={};
    pref.era[song.era]=(pref.era[song.era]||0)+w;
  }
  // タイアップ作品名の学習
  if(song.tie){
    if(!pref.tie)pref.tie={};
    const work=extractWork(song.tie);
    if(work)pref.tie[work]=(pref.tie[work]||0)+w;
  }
  // party系の学習
  if(!pref.party)pref.party={y:0,n:0};
  if(song.party)pref.party.y+=w; else pref.party.n+=w;
  resortDeck();
}
// キーを低/中/高の3帯に分類
function keyBand(k){
  const v=parseInt(k||'0');
  if(v<=-2)return 'low';
  if(v>=2)return 'high';
  return 'mid';
}
// タイアップから作品名を抽出
function extractWork(tie){
  if(!tie)return null;
  const m=tie.match(/[「『](.+?)[」』]/);
  return m?m[1]:null;
}
function calcPrefScore(song){
  let s=0;
  s+=(pref.tag[song.tag]||0)*3;
  s+=(pref.mood[song.mood]||0)*2.5;
  s+=(pref.v[song.v]||0)*1.5;
  s+=(pref.d[song.d]||0)*1;
  s+=(pref.a[song.a]||0)*2;
  if(song.sc)song.sc.forEach(sc=>{s+=(pref.sc[sc]||0)*1.5;});
  // キー帯
  const kb=pref.kb||{};
  s+=(kb[keyBand(song.k)]||0)*1.5;
  // 年代
  const er=pref.era||{};
  if(song.era)s+=(er[song.era]||0)*1.2;
  // タイアップ作品
  const ti=pref.tie||{};
  const work=extractWork(song.tie);
  if(work)s+=(ti[work]||0)*2;
  // party
  const pt=pref.party||{y:0,n:0};
  if(song.party&&pt.y>0)s+=pt.y*1.5;
  else if(!song.party&&pt.n>0)s+=pt.n*0.5;
  return s;
}
function calcMatch(song){
  const ps=calcPrefScore(song);
  const total=Object.values(pref.tag).reduce((a,b)=>a+Math.abs(b),0);
  const base=dynamicSingability(song);
  if(total<1)return base;
  const boost=Math.max(-12,Math.min(12,ps*1.8));
  return Math.max(50,Math.min(99,Math.round(base+boost)));
}
function resortDeck(){
  const age=_userAge||localStorage.getItem('sr_age')||'';
  const boostEras=AGE_ERA_MAP[age]||[];
  const scored=deck.map(i=>{
    let s=calcPrefScore(S[i])+(Math.random()-.5)*.8;
    // 年代ブースト: 選択年代に合うeraの曲を圧倒的に優先
    if(boostEras.length){
      if(boostEras.includes(S[i].era||''))s+=50;
      // 人気曲をさらにブースト
      if(boostEras.includes(S[i].era||'')&&S[i].popularity==='high')s+=20;
    }
    return {i,s};
  });
  scored.sort((a,b)=>b.s-a.s);
  deck=scored.map(x=>x.i);
}
// ==============================================
// RECOMMENDATION REASON ENGINE v2
// 研究知見ベース:
//   - Afchar 2022: アイテム類似+ユーザー類似の組合せが効果的
//   - Cialdini: Social Proof（社会的証明）が最強の説得力
//   - Zhao et al.: 友人口調の推薦理由がクリック率UP
//   - 過剰な詳細は認知負荷→逆効果 → 最大2行、短文
// ==============================================

// 疑似Social Proof: 曲の人気度+マッチ度から「似た趣味の人の○%」を生成
function fakeSocialProof(song){
  const base = song.popularity==='high'?78:song.popularity==='mid'?62:45;
  const match = calcMatch(song);
  const boost = Math.round((match-70)*0.3);
  return Math.max(40,Math.min(96, base+boost+(song.id.charCodeAt(3)%12)-5));
}

// 曲→曲の共起関係（疑似: 同タグ+同ムードの曲をペアとみなす）
function getCooccurrence(song){
  const bkSongs = bookmarks.map(b=>b.song);
  if(!bkSongs.length) return null;
  // ブックマーク内で同タグ or 同ムードの曲を探す
  const paired = bkSongs.find(bs =>
    bs.id!==song.id && (bs.tag===song.tag || bs.mood===song.mood) && bs.a!==song.a
  );
  return paired || null;
}

// tie-in連鎖（同じドラマ/アニメ/映画の曲）
function getTieInChain(song){
  if(!song.tie) return null;
  const bkSongs = bookmarks.map(b=>b.song);
  // tie-inから作品名を抽出（「」内）
  const m = song.tie.match(/[「『](.+?)[」』]/);
  if(!m) return null;
  const work = m[1];
  const linked = bkSongs.find(bs => bs.id!==song.id && bs.tie && bs.tie.includes(work));
  return linked ? {work, linked} : null;
}

// キー近似×ジャンル違い（新発見促進）
function getCrossGenreByKey(song){
  const bkSongs = bookmarks.map(b=>b.song);
  if(!bkSongs.length) return false;
  const likedTags = new Set(bkSongs.map(b=>b.tag));
  // この曲のジャンルは未知で、キーが近い曲をいいねしてる
  if(likedTags.has(song.tag)) return false;
  const sameKeyLiked = bkSongs.find(bs => bs.k===song.k && bs.tag!==song.tag);
  return !!sameKeyLiked;
}

// メイン: 推薦理由タグ生成（研究ベース強化版）
function getRecoTags(song){
  const totalPref=Object.values(pref.tag).reduce((a,b)=>a+Math.abs(b),0);
  const tags=[];
  const as=pref.a[song.a]||0;
  const ts=pref.tag[song.tag]||0;
  const ms=pref.mood[song.mood]||0;
  const vs=pref.v[song.v]||0;
  const ds=pref.d[song.d]||0;
  const bkSongs=bookmarks.map(b=>b.song);

  // ---------- 1. Social Proof（Cialdini: 最強の説得力）----------
  if(totalPref>=2){
    const pct=fakeSocialProof(song);
    if(pct>=60){
      tags.push({s:8,label:`似た趣味の人の${pct}%が歌ってます`,
        html:`<span class="htag reason-social">👥 似た趣味の${pct}%が歌唱</span>`});
    }
  }

  // ---------- 2. アーティスト一致（友人口調）----------
  const sameArtistLiked=bkSongs.find(ls=>ls.a===song.a&&ls.id!==song.id);
  if(as>=1.5){
    const label=sameArtistLiked
      ?`「${sameArtistLiked.t}」が好きなら絶対これも！`
      :`${song.a} をもっと聴きたくない？`;
    tags.push({s:as*5,label,
      html:`<span class="htag reason-strong">🎤 ${song.a} が好きなあなたへ</span>`});
  }

  // ---------- 3. 曲→曲の共起（yapico的: この曲の後によく歌われる）----------
  const cooc=getCooccurrence(song);
  if(cooc){
    tags.push({s:5,label:`「${cooc.t}」の後によく歌われてます`,
      html:`<span class="htag reason-cooc">\u{1F517}\u300C${cooc.t}\u300D\u3092\u6B4C\u3046\u4EBA\u304C\u6B4C\u3063\u3066\u308B</span>`});
  }

  // ---------- 4. ブックマーク傾向分析 ----------
  if(bkSongs.length>=3 && totalPref>=3){
    // 上位ムードとシーンを特定
    const topMood=Object.entries(pref.mood).sort((a,b)=>b[1]-a[1])[0];
    const topSc=Object.entries(pref.sc).sort((a,b)=>b[1]-a[1])[0];
    if(topMood&&topMood[1]>=1.5&&song.mood===topMood[0]&&ms>=0.5){
      const ml={'盛り上がる！':'盛り上がる曲','じーんとくる':'しみじみ系','聴き入っちゃう':'聴き入る系','おおっ！てなる':'インパクト系','キュンとくる♡':'キュン系'};
      tags.push({s:4,label:`あなたの好みは${ml[song.mood]||song.mood}！これもハマるかも`,
        html:`<span class="htag reason">📊 あなたの傾向: ${ml[song.mood]||song.mood}</span>`});
    }
    if(topSc&&topSc[1]>=1.5&&song.sc&&song.sc.includes(topSc[0])){
      tags.push({s:3.5,label:`${topSc[0]}で歌うならこれ`,
        html:`<span class="htag reason">🎪 ${topSc[0]}にぴったり</span>`});
    }
  }

  // ---------- 5. tie-in連鎖（同じドラマ/アニメ）----------
  const tieIn=getTieInChain(song);
  if(tieIn){
    tags.push({s:6,label:`「${tieIn.work}」つながり！`,
      html:`<span class="htag reason-strong">📺「${tieIn.work}」つながり</span>`});
  }

  // ---------- 6. 声域に合う別ジャンル（新発見促進）----------
  if(getCrossGenreByKey(song)){
    tags.push({s:3,label:'あなたの声域に合う新ジャンル！',
      html:`<span class="htag reason-discover">💡 声域◎ 新しいジャンルに挑戦</span>`});
  }

  // ---------- 7. 世代トレンド（全年代対応）----------
  if(song.popularity==='high'){
    const eraLabels={'2020s':'今の定番','2010s':'10年代の名曲','2000s':'2000年代の鉄板','90s':'90年代の神曲','80s':'80年代の伝説','70s':'70年代クラシック'};
    const el=eraLabels[song.era];
    if(el){
      tags.push({s:2.5,label:el,
        html:`<span class="htag reason">🔥 ${el}</span>`});
    }
  }

  // ---------- 7.5. 盛り上がりソング（party活用）----------
  const pt=pref.party||{y:0,n:0};
  if(song.party&&pt.y>=1){
    tags.push({s:3,label:'盛り上がり系が好きなあなたに！',
      html:`<span class="htag reason-strong">🎉 盛り上がり確定！</span>`});
  }

  // ---------- 8. 忘れてませんか？（定番なのにまだ見てない）----------
  if(song.popularity==='high'&&song.singability>=82&&!seen.has(song.id)&&totalPref>=3){
    tags.push({s:2,label:'ど定番！忘れてませんか？',
      html:`<span class="htag reason-classic">👑 ど定番！歌える人多数</span>`});
  }


  // ---------- 既存: ジャンル/テンポ/難易度一致 ----------
  if(ts>=0.7){
    tags.push({s:ts*2.5,label:`#${song.tag}好きにぴったり`,
      html:`<span class="htag reason">#${song.tag} 一致</span>`});
  }
  if(vs>=0.7){
    const vl={1:'バラード好き',2:'ミドル好き',3:'アップテンポ好き'};
    tags.push({s:vs*1.5,label:vl[song.v],
      html:`<span class="htag reason">${vl[song.v]}</span>`});
  }

  // 研究知見: 最大2つの理由が最適（過剰は認知負荷）
  tags.sort((a,b)=>b.s-a.s);
  return tags.slice(0,2);
}

function getRecoTagsHTML(song){
  const tags=getRecoTags(song);
  if(!tags.length)return '';
  return `<div class="match-reasons">${tags.map(t=>t.html).join('')}</div>`;
}

// グループ内で重なってる曲を取得
function getOverlappingSongs(){
  const myIds=new Set(bookmarks.map(b=>b.id));
  const others=getGroupBookmarks();
  const overlap=[];
  for(const [name,data] of Object.entries(others)){
    for(const sid of data.bookmarkIds){
      if(myIds.has(sid)){
        const existing=overlap.find(o=>o.songId===sid);
        if(existing){existing.members.push(name);}
        else{overlap.push({songId:sid,members:[_userName,name]});}
      }
    }
  }
  // メンバー数で降順ソート
  overlap.sort((a,b)=>b.members.length-a.members.length);
  return overlap;
}

function bindBigCardSwipe(card){
  let sx=0,sy=0,dx=0,dy=0,dragging=false;
  const hintLike=card.querySelector('.like-zone');
  const hintSkip=card.querySelector('.skip-zone');
  const sIdx=parseInt(card.dataset.i);
  const song=S[sIdx];

  function start(x,y){sx=x;sy=y;dx=0;dy=0;dragging=true;card.style.transition='none';}
  function move(x,y){
    if(!dragging)return;
    dx=x-sx;dy=y-sy;
    card.style.transform=`translate(${dx}px,${dy*0.3}px) rotate(${dx*0.08}deg)`;
    if(dx>20){
      if(hintLike){hintLike.classList.add('active');hintLike.classList.remove('dim');}
      if(hintSkip){hintSkip.classList.remove('active');hintSkip.classList.add('dim');}
    }else if(dx<-20){
      if(hintSkip){hintSkip.classList.add('active');hintSkip.classList.remove('dim');}
      if(hintLike){hintLike.classList.remove('active');hintLike.classList.add('dim');}
    }else{
      if(hintLike){hintLike.classList.remove('active','dim');}
      if(hintSkip){hintSkip.classList.remove('active','dim');}
    }
  }
  function end(){
    if(!dragging)return;dragging=false;
    if(hintLike){hintLike.classList.remove('active','dim');}
    if(hintSkip){hintSkip.classList.remove('active','dim');}
    if(_swiping)return;

    if(dx>75){
      // RIGHT = LIKE
      _swiping=true;
      card.style.transition='transform .35s ease,opacity .35s';
      card.style.transform=`translate(380px,-20px) rotate(18deg)`;card.style.opacity='0';
      tagBurst(card,'r',song);hearts(card);moodPopup(song);
      setTimeout(()=>{addCardLogic(0);addKaraDesire(6);renderHome();_swiping=false;},320);
    }else if(dx<-75){
      // LEFT = SKIP
      _swiping=true;
      card.style.transition='transform .35s ease,opacity .35s';
      card.style.transform=`translate(-380px,-20px) rotate(-18deg)`;card.style.opacity='0';
      tagBurst(card,'l',song);
      setTimeout(()=>{skipCardLogic(0);addKaraDesire(2);renderHome();_swiping=false;},320);
    }else{
      card.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
      card.style.transform='';
    }
  }
  // Tap → song detail (only if no drag)
  card.addEventListener('click',e=>{
    if(Math.abs(dx)>10||Math.abs(dy)>10)return;
    if(e.target.closest('.bigcard-action'))return;
    detailHistory=['home'];
    go('song-detail',{songId:song.id});
  });
  card.addEventListener('touchstart',e=>{if(_swiping)return;const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(_swiping)return;const t=e.touches[0];move(t.clientX,t.clientY);},{passive:false});
  card.addEventListener('touchend',end);
  card.addEventListener('touchcancel',()=>{dragging=false;card.style.transition='transform .25s';card.style.transform='';if(likeL)likeL.style.opacity=0;if(skipL)skipL.style.opacity=0;});
  card.addEventListener('mousedown',e=>{
    if(_swiping)return;
    start(e.clientX,e.clientY);
    const mm=ev=>{ev.preventDefault();move(ev.clientX,ev.clientY);};
    const mu=()=>{end();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

/* ============================================
   SWIPE BINDING
   ============================================ */
function bindVCardSwipe(card,slot){
  let sx=0,sy=0,dx=0,dy=0;
  card._dx=0;
  const hLike=card.querySelector('.vcard-hint.like');
  const hSkip=card.querySelector('.vcard-hint.skip');
  const start=(x,y)=>{sx=x;sy=y;dx=0;dy=0;card._dx=0;card.style.transition='none';};
  const move=(x,y)=>{
    dx=x-sx;dy=y-sy;card._dx=dx;
    card.style.transform=`translateX(${dx}px) rotate(${dx*.06}deg)`;
    if(dx>15){
      if(hLike){hLike.classList.add('active');hLike.classList.remove('dim');}
      if(hSkip){hSkip.classList.remove('active');hSkip.classList.add('dim');}
    }else if(dx<-15){
      if(hSkip){hSkip.classList.add('active');hSkip.classList.remove('dim');}
      if(hLike){hLike.classList.remove('active');hLike.classList.add('dim');}
    }else{
      if(hLike){hLike.classList.remove('active','dim');}
      if(hSkip){hSkip.classList.remove('active','dim');}
    }
  };
  const end=()=>{
    if(hLike){hLike.classList.remove('active','dim');}
    if(hSkip){hSkip.classList.remove('active','dim');}
    if(_swiping)return;
    if(dx>75){
      _swiping=true;
      tagBurst(card,'r',S[displayed[slot]]);hearts(card);
      card.style.transition='transform .35s ease,opacity .35s';
      card.style.transform='translate(380px,-30px) rotate(22deg)';card.style.opacity='0';
      setTimeout(()=>{
        addCardLogic(slot);addKaraDesire(6);
        if(homeMode==='list'){removeAndPatchList(card);}else{renderHome();}
        updateKaraMeterUI();
        document.getElementById('counter').textContent=`${seen.size} / ${S.length}\u66F2`;
        _swiping=false;
      },320);
    }else if(dx<-75){
      _swiping=true;
      tagBurst(card,'l',S[displayed[slot]]);
      card.style.transition='transform .35s ease,opacity .35s';
      card.style.transform='translate(-380px,-30px) rotate(-22deg)';card.style.opacity='0';
      setTimeout(()=>{
        skipCardLogic(slot);addKaraDesire(2);
        if(homeMode==='list'){removeAndPatchList(card);}else{renderHome();}
        updateKaraMeterUI();
        document.getElementById('counter').textContent=`${seen.size} / ${S.length}\u66F2`;
        _swiping=false;
      },320);
    }else{
      card.style.transition='transform .2s ease';card.style.transform='';
    }
  };
  card.addEventListener('touchstart',e=>{if(_swiping)return;const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(_swiping)return;const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchend',end);
  card.addEventListener('touchcancel',()=>{card.style.transition='transform .2s';card.style.transform='';if(hLike){hLike.classList.remove('active','dim');}if(hSkip){hSkip.classList.remove('active','dim');}});
  card.addEventListener('mousedown',e=>{
    if(_swiping||e.target.closest('.vcard-btn'))return;
    start(e.clientX,e.clientY);
    const mm=ev=>move(ev.clientX,ev.clientY);
    const mu=()=>{end();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

function hearts(c){
  const r=c.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const em=['\u2764\uFE0F','\u{1F496}','\u{1F495}','\u2728'];
  for(let i=0;i<10;i++){
    const h=document.createElement('div');h.className='heart-p';
    h.textContent=em[Math.random()*4|0];h.style.left=cx+'px';h.style.top=cy+'px';
    h.style.setProperty('--tx',(Math.random()-.5)*220+'px');
    h.style.setProperty('--ty',-(Math.random()*160+40)+'px');
    h.style.fontSize=(14+Math.random()*14)+'px';
    document.body.appendChild(h);setTimeout(()=>h.remove(),900);
  }
}
function confetti(){
  const cols=['#6C5CE7','#FF69B4','#00D2A0','#FFD700','#FF6B35','#74B9FF'];
  for(let i=0;i<28;i++){
    const e=document.createElement('div');e.className='confetti-p';
    e.style.left=Math.random()*innerWidth+'px';e.style.top='-8px';
    e.style.background=cols[Math.random()*6|0];
    e.style.setProperty('--tx',(Math.random()-.5)*180+'px');
    e.style.width=(5+Math.random()*7)+'px';e.style.height=(5+Math.random()*7)+'px';
    e.style.animationDuration=(1+Math.random())+'s';
    document.body.appendChild(e);setTimeout(()=>e.remove(),2200);
  }
}
function vib(){if(navigator.vibrate)navigator.vibrate(25)}
function tagBurst(card,dir,song){
  const tags=card.querySelectorAll('.htag,.safety-badge');
  if(!tags.length)return;
  tags.forEach((tag,i)=>{
    const rect=tag.getBoundingClientRect();
    const clone=document.createElement('div');
    clone.className='tag-burst dir-'+dir;
    clone.textContent=tag.textContent;
    clone.style.left=rect.left+'px';clone.style.top=rect.top+'px';
    clone.style.background=getComputedStyle(tag).background;
    clone.style.color=getComputedStyle(tag).color;
    if(dir==='r'){
      const angle=-40+Math.random()*80;const dist=120+Math.random()*140;
      const rad=angle*Math.PI/180;
      clone.style.setProperty('--tx',Math.cos(rad)*dist+'px');
      clone.style.setProperty('--ty',Math.sin(rad)*dist-30+'px');
      clone.style.setProperty('--sc',(1.1+Math.random()*.5).toFixed(2));
      clone.style.setProperty('--rot',(Math.random()-.5)*50+'deg');
      clone.style.setProperty('--dur',(.55+i*.06)+'s');
      clone.style.animationDelay=(i*45)+'ms';
    }else{
      clone.style.setProperty('--tx',(-100-Math.random()*120)+'px');
      clone.style.setProperty('--ty',(Math.random()-.5)*50+'px');
      clone.style.setProperty('--rot',(-20-Math.random()*30)+'deg');
      clone.style.setProperty('--dur',(.3+i*.03)+'s');
      clone.style.animationDelay=(i*25)+'ms';
    }
    document.body.appendChild(clone);
    const ttl=parseFloat(clone.style.getPropertyValue('--dur'))*1000+(i*50)+200;
    setTimeout(()=>clone.remove(),ttl);
  });
  if(dir==='r'&&song){
    const emoji=MOOD_EMOJI[song.mood]||'';
    const pop=document.createElement('div');pop.className='mood-popup';
    pop.innerHTML=`<div style="font-size:48px">${emoji}</div><div style="font-size:20px;margin-top:2px">${song.mood}</div>`;
    pop.style.left='50%';pop.style.top='40%';
    pop.style.color=({'\u76DB\u308A\u4E0A\u304C\u308B\uFF01':'#FF6B35','\u3058\u30FC\u3093\u3068\u304F\u308B':'#74B9FF','\u8074\u304D\u5165\u3063\u3061\u3083\u3046':'#FFD700','\u304A\u304A\u3063\uFF01\u3066\u306A\u308B':'#6C5CE7','\u30AD\u30E5\u30F3\u3068\u304F\u308B\u2661':'#FF69B4'})[song.mood]||'#fff';
    document.body.appendChild(pop);setTimeout(()=>pop.remove(),800);
  }
}
function toast(m){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);

function renderBkTagFilters(){
  const wrap=document.getElementById('bkTagFilters');
  if(!bookmarks.length){wrap.innerHTML='';document.getElementById('bkActiveFilters').textContent='';return;}
  const songs=bookmarks.map(b=>b.song);

  // ジャンル（音楽分類のみ）
  const genres=[...new Set(songs.map(s=>songGenre(s)).filter(Boolean))].sort();
  // 特徴タグ（ジャンル以外）
  const features=[...new Set(songs.map(s=>songFeature(s)).filter(Boolean))].sort();
  // 空気感
  const moods=[...new Set(songs.map(s=>s.mood))];
  // 難易度
  const diffs=[1,2,3];
  // 年代
  const eras=[...new Set(songs.map(s=>s.era).filter(Boolean))].sort();

  function chipRow(label,key,values,displayFn){
    if(!values.length)return '';
    return `<div class="bk-filter-row">
      <span class="bk-filter-label">${label}</span>
      <div class="bk-filter-chips">
        ${values.map(v=>`<div class="bk-filter-chip ${_bkFilters[key]===v?'on':''}" data-key="${key}" data-val="${v}">${displayFn?displayFn(v):v}</div>`).join('')}
      </div>
    </div>`;
  }

  wrap.innerHTML=
    chipRow('\u30B8\u30E3\u30F3\u30EB','genre',genres)+
    chipRow('\u7279\u5FB4','feature',features)+
    chipRow('\u7A7A\u6C17\u611F','mood',moods,m=>(MOOD_EMOJI[m]||'')+' '+m)+
    chipRow('\u96E3\u6613\u5EA6','diff',diffs,d=>DIFF_LABEL[d])+
    chipRow('\u5E74\u4EE3','era',eras);

  wrap.querySelectorAll('.bk-filter-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const key=chip.dataset.key;
      const val=(key==='diff')?parseInt(chip.dataset.val):chip.dataset.val;
      if(_bkFilters[key]===val)_bkFilters[key]=null;
      else _bkFilters[key]=val;
      renderBookmark();
    });
  });

  const active=Object.values(_bkFilters).filter(v=>v!==null).length;
  const af=document.getElementById('bkActiveFilters');
  if(active>0){
    const filtered=filterBkByTags(bookmarks);
    af.textContent=`${filtered.length}/${bookmarks.length}\u66F2\u304C\u30D5\u30A3\u30EB\u30BF\u30FC\u6761\u4EF6\u306B\u4E00\u81F4`;
  }else{
    af.textContent='';
  }
}

function filterBkByTags(list){
  return list.filter(b=>{
    const s=b.song;
    if(_bkFilters.genre && songGenre(s)!==_bkFilters.genre)return false;
    if(_bkFilters.feature && songFeature(s)!==_bkFilters.feature)return false;
    if(_bkFilters.mood && s.mood!==_bkFilters.mood)return false;
    if(_bkFilters.diff && s.d!==_bkFilters.diff)return false;
    if(_bkFilters.era && s.era!==_bkFilters.era)return false;
    return true;
  });
}

function sortBookmarks(list,scene){
  const arr=[...list];
  if(scene==='all')return arr;
  const scoreFn={
    nomikai:b=>{const s=b.song;let sc=0;if(s.party)sc+=100;if(s.popularity==='high')sc+=50;if(s.v===3)sc+=30;return sc;},
    date:b=>{const s=b.song;let sc=0;if(s.v===1)sc+=100;if(s.mood==='\u3058\u30FC\u3093\u3068\u304F\u308B'||s.mood==='\u30AD\u30E5\u30F3\u3068\u304F\u308B\u2661')sc+=50;return sc;},
    joshikai:b=>{const s=b.song;let sc=0;if(s.mood==='\u30AD\u30E5\u30F3\u3068\u304F\u308B\u2661'||s.mood==='\u304A\u304A\u3063\uFF01\u3066\u306A\u308B')sc+=80;if(s.popularity==='high')sc+=40;return sc;},
    drive:b=>{const s=b.song;let sc=0;if(s.v===2||s.v===3)sc+=60;if(s.v===3)sc+=30;return sc;},
  };
  const fn=scoreFn[scene];
  if(fn)arr.sort((a,b)=>fn(b)-fn(a));
  return arr;
}

    const s=b.song;

    const mCol=singMatch>=85?'var(--growth)':singMatch>=75?'var(--accent)':'var(--cta)';
    const dSing=dynamicSingability(s);
    const dCol=dSing>=80?'var(--growth)':dSing>=65?'var(--accent)':'var(--cta)';

    const members=Object.keys(_fbGroupMembers);
    const hasGroup=members.length>=2;
    let grpInfo='';
    if(hasGroup){
      const styles=getMemberStyle(_fbGroupMembers);
      const otherKnowers=members.filter(uid=>{
        if(uid===_userId)return false;
        const m=_fbGroupMembers[uid]||{};
        return (m.bookmarkIds||[]).includes(b.id);
      });
      const otherWanters=members.filter(uid=>{
        if(uid===_userId)return false;
        const m=_fbGroupMembers[uid]||{};
        return (m.wantIds||[]).includes(b.id);
      });
      if(otherKnowers.length||otherWanters.length){
        grpInfo='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';
        otherKnowers.forEach(uid=>{
          const m=_fbGroupMembers[uid]||{};
          const st=styles[uid]||{emoji:'\u{1F464}',color:'#888'};
          const wants=otherWanters.includes(uid);
          grpInfo+=`<span class="grp-song-knower ${wants?'wants':''}">${st.emoji} ${m.name||uid}${wants?' \u6B4C\u3044\u305F\u3044':' \u77E5\u3063\u3066\u308B'}</span>`;
        });
        // 歌いたいだけの人（知ってる曲に入れてないけど歌いたい）
        otherWanters.filter(uid=>!otherKnowers.includes(uid)).forEach(uid=>{
          const m=_fbGroupMembers[uid]||{};
          const st=styles[uid]||{emoji:'\u{1F464}',color:'#888'};
          grpInfo+=`<span class="grp-song-knower wants">${st.emoji} ${m.name||uid} \u6B4C\u3044\u305F\u3044</span>`;
        });
        grpInfo+='</div>';
      }
    }
    return `<div class="bk-item ${isWant?'want-on':''}" data-bid="${b.id}">
      <button class="want-btn ${isWant?'on':''}" data-wid="${b.id}">
        <span class="material-symbols-rounded">${isWant?'check':'add'}</span>${isWant?'\u6B4C\u3044\u305F\u3044':'\u6B4C\u3044\u305F\u3044'}
      </button>
      <div class="bk-info">
        <div class="title">${s.t}</div>
        <div class="artist">${s.a}</div>
        ${hasGroup?`
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
            <span class="grp-song-knower is-me">\u{1F464} \u81EA\u5206 ${isWant?'\u6B4C\u3044\u305F\u3044':'\u77E5\u3063\u3066\u308B'}</span>
            ${grpInfo?grpInfo.replace('<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">','').replace('</div>',''):''}

          <div class="badges">
            <span class="htag genre">#${s.g||s.tag}</span>
            ${s.ft?`<span class="htag genre">#${s.ft}</span>`:''}
            <span class="htag air">${MOOD_EMOJI[s.mood]||''} ${s.mood}</span>
            <span class="htag diff">${DIFF_LABEL[s.d]}</span>

  }).join('');

  // Bind want-to-sing toggle
  list.querySelectorAll('.want-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const sid=btn.dataset.wid;
      if(wantToSing.has(sid)){wantToSing.delete(sid);btn.classList.remove('on');toast('\u6B4C\u3044\u305F\u3044\u66F2\u304B\u3089\u524A\u9664');}
      else{wantToSing.add(sid);btn.classList.add('on');toast('\u{1F3A4} \u6B4C\u3044\u305F\u3044\u66F2\u306B\u8FFD\u52A0!');}
      saveData();fbSyncMyBookmarks();
    });
  });
  // Bind row tap
  list.querySelectorAll('.bk-item').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.closest('.bk-del')||e.target.closest('.want-btn'))return;
      detailHistory=['bookmark'];
      go('song-detail',{songId:item.dataset.bid});
    });
  });
  list.querySelectorAll('.bk-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const did=btn.dataset.did;
      const s=songById[did];
      removeBookmark(did);
      toast(`✖ ${s?s.t:''} を削除`);
      renderBkList();
    });
  });

  const totalMin=Math.round(sorted.length*4);
  summary.innerHTML=`<div class="bk-summary-text">${sorted.length}曲 / 約${totalMin}分</div>`;
}

let coachStep=0,coachType='';
function maybeShowCoach(type){
  if(coachDone[type])return;
  coachType=type;coachStep=0;
  showCoachStep();
}

function showCoachStep(){
  const overlay=document.getElementById('coachOverlay');
  const spot=document.getElementById('coachSpot');
  const text=document.getElementById('coachText');
  overlay.classList.remove('hidden');

  const homeSteps=[
    {selector:'.bigcard,.vcard',text:'\u2190 \u77E5\u3089\u306A\u3044 / \u2192 \u77E5\u3063\u3066\u308B\u66F2\u306B\u8FFD\u52A0',textPos:'below'},
    {selector:'#searchWrap',text:'\u66F2\u540D\u3084\u30A2\u30FC\u30C6\u30A3\u30B9\u30C8\u540D\u3067\u691C\u7D22\u3082\u3067\u304D\u307E\u3059',textPos:'below'},
    {selector:'#n-bookmark',text:'\u77E5\u3063\u3066\u308B\u66F2\u3092\u78BA\u8A8D\u3001\u6B4C\u3044\u305F\u3044\u66F2\u3092\u9078\u3079\u307E\u3059',textPos:'above'},
  ];
  const bookmarkSteps=[
    {selector:'.bk-tag-filters',text:'\u30BF\u30B0\u3067\u7D5E\u308A\u8FBC\u307F\u3067\u304D\u307E\u3059',textPos:'below'},
    {selector:'.bk-list',text:'\u30BF\u30C3\u30D7\u3067\u8A73\u7D30\u3001\u300C\u6B4C\u3044\u305F\u3044\u300D\u30DC\u30BF\u30F3\u3067\u6B4C\u3044\u305F\u3044\u66F2\u3092\u30DE\u30FC\u30AF',textPos:'below'},
  ];
  const steps=coachType==='home'?homeSteps:bookmarkSteps;
  if(coachStep>=steps.length){endCoach();return;}
  const step=steps[coachStep];
  const el=document.querySelector(step.selector);
  if(!el){endCoach();return;}
  const rect=el.getBoundingClientRect();
  spot.style.left=(rect.left-8)+'px';
  spot.style.top=(rect.top-8)+'px';
  spot.style.width=(rect.width+16)+'px';
  spot.style.height=(rect.height+16)+'px';
  text.textContent=step.text;
  document.getElementById('coachStep').textContent=`STEP ${coachStep+1} / ${steps.length}`;
  document.getElementById('coachNext').textContent=coachStep>=steps.length-1?'はじめる':'次へ';
}

document.getElementById('coachNext').addEventListener('click',()=>{
  coachStep++;showCoachStep();
});
document.getElementById('coachSkip').addEventListener('click',endCoach);

function endCoach(){
  document.getElementById('coachOverlay').classList.add('hidden');
  logAction('coach_dismiss',{screen:coachType,step:coachStep});
  coachDone[coachType]=true;saveData();
}

function renderLogList(filterType){
  const list=document.getElementById('logList');
  const count=document.getElementById('logCount');
  let logs=filterType==='all'?actionLog:actionLog.filter(e=>e.type===filterType);
  logs=[...logs].reverse().slice(0,200);
  count.textContent=`${logs.length}件表示（全${actionLog.length}件）`;
  if(!logs.length){list.innerHTML='<div class="log-empty">まだログがありません</div>';return;}
  list.innerHTML=logs.map(e=>{
    const d=new Date(e.ts);
    const time=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const date=d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
    const icon=LOG_ICONS[e.type]||'\u{1F4DD}';
    const label=LOG_LABELS[e.type]||e.type;
    let detail='';
    if(e.songTitle)detail+=e.songTitle;
    if(e.artist)detail+=' / '+e.artist;
    if(e.query)detail+='「'+e.query+'」';
    if(e.results!==undefined)detail+=' → '+e.results+'件';
    if(e.from&&e.to)detail+=e.from+' → '+e.to;
    if(e.mode)detail+=e.mode;
    if(e.count)detail+=e.count+'曲';
    if(e.screen)detail+='('+e.screen+')';
    if(e.seconds!==undefined)detail+=(detail?' / ':'')+''+e.seconds+'秒';
    if(e.sessionId&&(e.type==='session_start'||e.type==='session_end'))detail+=(detail?' ':'')+'['+e.sessionId.slice(-6)+']';
    if(e.tag)detail+=(detail?' / ':'')+e.tag;
    if(e.tags)detail+=(detail?' / ':'')+'['+JSON.stringify(e.tags).slice(0,40)+']';
    if(e.error)detail+=(detail?' / ':'')+e.error;
    return `<div class="log-entry">
      <div class="log-icon">${icon}</div>
      <div class="log-body"><div class="log-action">${label}</div>${detail?`<div class="log-detail">${detail}</div>`:''}</div>
      <div class="log-time">${date} ${time}</div>
    </div>`;
  }).join('');
}

function exportLogCSV(){
  if(!actionLog.length){toast('ログがありません');return;}
  const header='timestamp,type,testerId,songId,songTitle,artist,match,query,results,from,to,mode,count,screen,sessionId,seconds,tag,group,tags,delta,level,error';
  const rows=actionLog.map(e=>{
    const d=new Date(e.ts).toISOString();
    const tagsStr=e.tags?JSON.stringify(e.tags).replace(/"/g,'""'):'';
    return [d,e.type||'',`"${(e.testerId||'').replace(/"/g,'""')}"`,e.songId||'',`"${(e.songTitle||'').replace(/"/g,'""')}"`,
      `"${(e.artist||'').replace(/"/g,'""')}"`,e.match??'',`"${(e.query||'').replace(/"/g,'""')}"`,
      e.results??'',e.from||'',e.to||'',e.mode||'',e.count||'',e.screen||'',
      e.sessionId||'',e.seconds??'',e.tag||'',e.group||'',`"${tagsStr}"`,e.delta??'',e.level??'',e.error||''].join(',');
  });
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`sr_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(a.href);
  toast('CSV出力しました');
}
