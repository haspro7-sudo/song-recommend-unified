let activeTagFilters = {scenes: new Set(), moods: new Set(), features: new Set()};

function hasActiveTagFilters(){
  return activeTagFilters.scenes.size > 0 || activeTagFilters.moods.size > 0 || activeTagFilters.features.size > 0;
}

function filterBookmarksByTags(list){
  if(!hasActiveTagFilters()) return list;
  return list.filter(b => {
    const s = b.song;
    // Scene filter (AND): every selected scene must be in song's sc array
    for(const sc of activeTagFilters.scenes){
      const sceneMap = {nomikai:'飲み会', date:'デート', drive:'ドライブ', joshikai:'女子会'};
      if(!s.sc || !s.sc.includes(sceneMap[sc])) return false;
    }
    // Mood filter (AND): every selected mood must match
    for(const m of activeTagFilters.moods){
      if(s.mood !== m) return false;
    }
    // Feature filter
    for(const f of activeTagFilters.features){
      switch(f){
        case 'party': if(!s.party) return false; break;
        case 'easy': if(!(s.singability>=80)) return false; break;
        case 'popular': if(s.popularity!=='high') return false; break;
        case 'anime': if(!((s.tie&&s.tie.includes('アニメ'))||(s.tag&&s.tag.includes('アニソン')))) return false; break;
        case 'drama': if(!(s.tie&&s.tie.includes('ドラマ'))&&!(s.tag&&s.tag.includes('ドラマ'))) return false; break;
        case 'movie': if(!(s.tie&&s.tie.includes('映画'))&&!(s.tag&&s.tag.includes('映画'))) return false; break;
        case 'tiktok': if(s.tag!=='TikTokバズ') return false; break;
        case 'kpop': if(s.tag!=='K-POP') return false; break;
        case 'western': if(s.tag!=='洋楽') return false; break;
        case 'vocaloid': if(s.tag!=='ボカロ') return false; break;
        case 'enka': if(s.tag!=='演歌') return false; break;
        case 'idol': if(s.tag!=='アイドル') return false; break;
        case 'rock': if(s.tag!=='ロック') return false; break;
        case 'disney': if(!(s.tag&&s.tag.includes('ディズニー'))&&!(s.tie&&s.tie.includes('ディズニー'))) return false; break;
        case 'kids': if(s.tag!=='キッズ') return false; break;
        case 'rnb': if(s.tag!=='R&B') return false; break;
        case 'era2020s': if(s.era!=='2020s') return false; break;
        case 'era2010s': if(s.era!=='2010s') return false; break;
        case 'era2000s': if(s.era!=='2000s'&&s.era!=='1990s'&&s.era!=='classic') return false; break;
        case 'duet': if(!s.party) return false; break;
        case 'lowkey': {const kv=parseInt(s.k||'0'); if(kv>0||s.v>1) return false; break;}
      }
    }
    return true;
  });
}

  if(!bookmarks.length){wrap.style.display='none';return;}

  ).join('');

  // Mood chips
  const moodWrap = document.getElementById('tagChipsMood');
  moodWrap.innerHTML = TAG_MOODS.map(t =>
    `<div class="tag-chip ${activeTagFilters.moods.has(t.id)?'on':''}" data-tag="${t.id}" data-group="moods">${t.emoji} ${t.label}</div>`
  ).join('');

  // Feature chips - split into 3 sub-groups
  const TRAIT_IDS = ['party','easy','popular','duet','lowkey'];
  const GENRE_IDS = ['anime','drama','movie','tiktok','kpop','western','vocaloid','enka','idol','rock','disney','kids','rnb'];
  const ERA_IDS = ['era2020s','era2010s','era2000s'];
  const chipHtml = t => `<div class="tag-chip ${activeTagFilters.features.has(t.id)?'on':''}" data-tag="${t.id}" data-group="features">${t.emoji} ${t.label}</div>`;
  document.getElementById('tagChipsFeatureTrait').innerHTML = TAG_FEATURES.filter(t=>TRAIT_IDS.includes(t.id)).map(chipHtml).join('');
  document.getElementById('tagChipsFeatureGenre').innerHTML = TAG_FEATURES.filter(t=>GENRE_IDS.includes(t.id)).map(chipHtml).join('');
  document.getElementById('tagChipsFeatureEra').innerHTML = TAG_FEATURES.filter(t=>ERA_IDS.includes(t.id)).map(chipHtml).join('');

  // Bind chip clicks
  wrap.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.dataset.tag;
      const group = chip.dataset.group;
      const set = activeTagFilters[group];
      if(set.has(tag)){
        set.delete(tag);
        logAction('tag_filter_remove', {tag, group});
      } else {
        set.add(tag);
        logAction('tag_filter_add', {tag, group});
      }
      renderTagFilter();
      renderBkList();
    });
  });

  // Active tags display
  const activeWrap = document.getElementById('tagFilterActive');
  if(hasActiveTagFilters()){
    let chips = '';
    for(const sc of activeTagFilters.scenes){
      const t = TAG_SCENES.find(x=>x.id===sc);
      chips += `<div class="tag-active-chip" data-tag="${sc}" data-group="scenes">${t?t.emoji:''} ${t?t.label:sc} <span class="remove">✕</span></div>`;
    }
    for(const m of activeTagFilters.moods){
      const t = TAG_MOODS.find(x=>x.id===m);
      chips += `<div class="tag-active-chip" data-tag="${m}" data-group="moods">${t?t.emoji:''} ${t?t.label:m} <span class="remove">✕</span></div>`;
    }
    for(const f of activeTagFilters.features){
      const t = TAG_FEATURES.find(x=>x.id===f);
      chips += `<div class="tag-active-chip" data-tag="${f}" data-group="features">${t?t.emoji:''} ${t?t.label:f} <span class="remove">✕</span></div>`;
    }
    activeWrap.innerHTML = chips;
    activeWrap.querySelectorAll('.tag-active-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const tag = chip.dataset.tag;
        const group = chip.dataset.group;
        activeTagFilters[group].delete(tag);
        logAction('tag_filter_remove', {tag, group});
        renderTagFilter();
        renderBkList();
      });
    });
  } else {
    activeWrap.innerHTML = '';
  }
}

function renderGrpMoodFilter(){}

function renderGrpSongList(styles){
  const wrap=document.getElementById('grpSongList');

  if(Object.keys(_fbGroupMembers).length<2){
    wrap.innerHTML='<div class="grp-empty-msg"><div style="font-size:36px;margin-bottom:8px">⏳</div>メンバーが参加するのを待っています...<br>同じグループコードで入ってもらおう！</div>';
    return;
  }

  // 全メンバーのブックマーク曲を集約
  const songKnowers={};
  for(const [name,data] of Object.entries(_fbGroupMembers)){
    for(const sid of (data.bookmarkIds||[])){
      if(!songKnowers[sid])songKnowers[sid]=[];
      songKnowers[sid].push(name);
    }
  }

  // 曲リストを作成（知ってる人数で降順ソート）
  let songList=Object.entries(songKnowers)
    .map(([sid,knowers])=>({song:songById[sid],knowers}))
    .filter(x=>x.song);

  // ムードフィルター
  if(false){
    songList=songList.filter(x=>x.song.mood===_grpMoodFilter);
  }

  // ソート：知ってる人数多い順 → 同数なら人気順
  songList.sort((a,b)=>{
    if(b.knowers.length!==a.knowers.length)return b.knowers.length-a.knowers.length;
    return (b.song.popularity==='high'?1:0)-(a.song.popularity==='high'?1:0);
  });

  if(!songList.length){
    wrap.innerHTML='<div class="grp-empty-msg"><div style="font-size:36px;margin-bottom:8px">🎵</div>この雰囲気の曲はまだありません<br>ブックマークを増やしてみよう！</div>';
    return;
  }

  const totalMembers=Object.keys(_fbGroupMembers).length;

  // セクション分け
  const sections=[];
  const allKnow=songList.filter(x=>x.knowers.length>=totalMembers);
  const someKnow=songList.filter(x=>x.knowers.length>=2&&x.knowers.length<totalMembers);
  const oneOnly=songList.filter(x=>x.knowers.length===1);

  if(allKnow.length)sections.push({label:'🔥 全員が知ってる！',songs:allKnow,cls:'hot'});
  if(someKnow.length)sections.push({label:'👥 何人かが知ってる',songs:someKnow,cls:'warm'});
  if(oneOnly.length)sections.push({label:'👤 誰かだけが知ってる',songs:oneOnly,cls:'cold'});

  // セクション分けなし、フラットに全曲表示
  const flatList=[...allKnow,...someKnow,...oneOnly];
  wrap.innerHTML=flatList.map(({song:s,knowers})=>{
      const countClass=knowers.length>=totalMembers?'hot':knowers.length>=2?'warm':'cold';
      return `<div class="grp-song" onclick="detailHistory=['group'];go('song-detail',{songId:'${s.id}'})">
        <div class="grp-song-body">
          <div class="grp-song-title">${s.t}</div>
          <div class="grp-song-artist">${s.a}</div>
          <div class="grp-song-knowers">
            ${knowers.map(uid=>{
              const member=_fbGroupMembers[uid]||{};
              const displayName=member.name||uid;
              const st=styles[uid]||{emoji:'👤',color:'#888'};
              const isMe=uid===_userId;
              const memberWants=isMe?wantToSing.has(s.id):(member.wantIds||[]).includes(s.id);
              const label=isMe?'自分':displayName;
              const status=memberWants?' \u6B4C\u3044\u305F\u3044':' \u77E5\u3063\u3066\u308B';
              const greenShade=countClass==='hot'?'#1B8A2E':countClass==='warm'?'#34A853':'#8BC99B';
              const greenBg=countClass==='hot'?'rgba(27,138,46,.15)':countClass==='warm'?'rgba(52,168,83,.1)':'rgba(139,201,155,.08)';
              const tagStyle=memberWants?'':`background:${greenBg};color:${greenShade}`;
              return `<span class="grp-song-knower ${isMe?'is-me':''} ${memberWants?'wants':''}" style="${tagStyle};border-left:3px solid ${memberWants?'var(--accent)':greenShade}">${st.emoji} ${label}${status}</span>`;
            }).join('')}
          </div>
        </div>
        <div class="grp-song-count ${countClass}">${knowers.length}</div>
      </div>`;
    }).join('');
}

    _devTapCount++;

    _devTapTimer=setTimeout(()=>{_devTapCount=0;},1500);
    if(_devTapCount>=5){_devTapCount=0;showDevPanel();toast('開発者パネル');}
  });
});
function showDevPanel(){
  document.getElementById('mypageView').style.display = 'none';
  document.getElementById('logViewer').style.display = '';
  renderLogViewer();
}
function hideDevPanel(){
  document.getElementById('logViewer').style.display = 'none';
  document.getElementById('mypageView').style.display = '';
}
function resetAllData(){
  if(!confirm('全データ（ブックマーク・好み・セトリ等）をリセットしますか？')) return;
  bookmarks=[];pref={tag:{},mood:{},v:{},d:{},a:{},sc:{},kb:{},era:{},tie:{},party:{y:0,n:0}};seen=new Set();karaDesire=0;playlists=[];coachDone={};
  saveData();updateKaraMeterUI();renderMyPage();toast('データをリセットしました');
}

/* ============================================
   SHEETS CONFIG v11
   ============================================ */
const SHEET_ID_KEY = 'sr_sheetId';
const GAS_URL_KEY = 'sr_gasUrl';

function initSheetsConfig(){
  // Tester ID（ログイン画面から設定済み。開発者パネルでは表示のみ）
  const tStatus = document.getElementById('testerIdStatus');
  const savedTester = localStorage.getItem(TESTER_ID_KEY) || '';
  if(savedTester){ tStatus.textContent = savedTester + (_groupCode ? ' / グループ: '+_groupCode : '') + ' ✓'; tStatus.style.color = 'var(--growth)'; }
  else { tStatus.textContent = '未設定'; }
  // Sheets URL
  const input = document.getElementById('sheetIdInput');
  const status = document.getElementById('sheetsStatus');
  const savedId = localStorage.getItem(SHEET_ID_KEY) || '';
  const savedUrl = localStorage.getItem(GAS_URL_KEY) || '';
  input.value = savedUrl || savedId;
  if(savedUrl){
    status.textContent = '設定済み ✓';
    status.style.color = 'var(--growth)';
  }
  input.addEventListener('change', () => {
    const val = input.value.trim();
    if(val){
      localStorage.setItem(GAS_URL_KEY, val);
      status.textContent = '保存しました ✓';
      status.style.color = 'var(--growth)';
    } else {
      localStorage.removeItem(GAS_URL_KEY);
      status.textContent = '未設定';
      status.style.color = '';
    }
  });
}

   INIT

renderHome();
